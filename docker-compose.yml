# =============================================================================
# MLOps Workspace - Multi-Container Architecture
# =============================================================================
# Phase 1: Local development environment (CPU-only)
#
# Usage:
#   docker-compose build                    # Build all images
#   docker-compose up -d                    # Start services
#   docker-compose run --rm flux-gen        # Run a worker job
#   docker-compose --profile dev up -d      # Start dev shell
#   docker-compose down                     # Stop all
#
# =============================================================================

version: '3.8'

services:

  # ---------------------------------------------------------------------------
  # SERVICES (long-running)
  # ---------------------------------------------------------------------------

  # MongoDB for FiftyOne
  mongodb:
    image: mongo:7.0
    container_name: mlops-mongodb
    restart: unless-stopped
    volumes:
      - mongodb-data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=fiftyone
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - mlops-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  comfyui:
    build:
      context: .
      dockerfile: services/comfyui/Dockerfile
    image: mlops-comfyui:latest
    container_name: mlops-comfyui
    restart: unless-stopped
    ports:
      - "8188:8188"
    volumes:
      - ./services/comfyui:/workspace/comfyui/config:ro
      - comfyui-models:/workspace/comfyui/models
      - comfyui-output:/workspace/comfyui/output
      - comfyui-input:/workspace/comfyui/input
    environment:
      - COMFYUI_HOST=0.0.0.0
      - COMFYUI_PORT=8188
      - COMPUTE_DEVICE=cpu
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8188/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - mlops-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G

  fiftyone:
    build:
      context: .
      dockerfile: services/fiftyone/Dockerfile
    image: mlops-fiftyone:latest
    container_name: mlops-fiftyone
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "5151:5151"
    volumes:
      - ./services/fiftyone:/workspace/fiftyone/config:ro
      - fiftyone-data:/workspace/fiftyone/datasets
      - ./data:/workspace/data:ro
    environment:
      - FIFTYONE_APP_ADDRESS=0.0.0.0
      - FIFTYONE_APP_PORT=5151
      - FIFTYONE_DATABASE_URI=mongodb://mongodb:27017/fiftyone
      - FIFTYONE_AUTO_LOAD_QUICKSTART=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5151"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - mlops-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G

  # Self-hosted W&B Server
  wandb-server:
    image: wandb/local:latest
    container_name: mlops-wandb-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - wandb-data:/vol/wandb
    environment:
      - LOCAL_RESTORE=true
      - GORILLA_ALLOW_USER_REGISTRATION=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - mlops-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G

  # Label Studio - Data labeling platform
  label-studio:
    image: heartexlabs/label-studio:latest
    container_name: mlops-label-studio
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - label-studio-data:/label-studio/data
      - ./data:/label-studio/files:ro
    environment:
      - LABEL_STUDIO_LOCAL_FILES_SERVING_ENABLED=true
      - LABEL_STUDIO_LOCAL_FILES_DOCUMENT_ROOT=/label-studio/files
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - mlops-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  # ---------------------------------------------------------------------------
  # WORKERS (job executors) - use: docker-compose run --rm <worker>
  # ---------------------------------------------------------------------------

  flux-gen:
    build:
      context: .
      dockerfile: projects/flux-comfyui-generation/Dockerfile
    image: mlops-flux-gen:latest
    depends_on:
      - wandb-server
    volumes:
      - .:/workspace:cached
      - flux-output:/workspace/outputs/flux-generations
    environment:
      - WANDB_BASE_URL=http://wandb-server:8080
      - WANDB_PROJECT=flux-comfyui-generation
      - COMPUTE_DEVICE=cpu
      - B2_LOCAL_MANIFEST=/workspace/.b2_local_manifest.json
    networks:
      - mlops-network
    profiles:
      - workers
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G

  adv-patches:
    build:
      context: .
      dockerfile: projects/adversarial-patches/Dockerfile
    image: mlops-adv-patches:latest
    depends_on:
      - wandb-server
      - mongodb
    volumes:
      - .:/workspace:cached
      - adv-output:/workspace/outputs/adversarial-patches
      - fiftyone-data:/workspace/data/fiftyone
    environment:
      - WANDB_BASE_URL=http://wandb-server:8080
      - WANDB_PROJECT=adversarial-patches
      - FIFTYONE_DATABASE_URI=mongodb://mongodb:27017/fiftyone
      - COMPUTE_DEVICE=cpu
    networks:
      - mlops-network
    profiles:
      - workers
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G

  lora-trainer:
    build:
      context: .
      dockerfile: projects/lora-trainer/Dockerfile
    image: mlops-lora-trainer:latest
    depends_on:
      - wandb-server
    volumes:
      - .:/workspace:cached
      - lora-checkpoints:/workspace/outputs/lora-checkpoints
      - lora-data:/workspace/data/lora-training
    environment:
      - WANDB_BASE_URL=http://wandb-server:8080
      - WANDB_PROJECT=lora-trainer
      - COMPUTE_DEVICE=cpu
    networks:
      - mlops-network
    profiles:
      - workers
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G

  # Data Collector - Reddit scraping + auto-captioning
  data-collector:
    build:
      context: .
      dockerfile: projects/data-collector/Dockerfile
    image: mlops-data-collector:latest
    depends_on:
      - mongodb
    volumes:
      - .:/workspace:cached
      - ./data/collected:/workspace/data/collected
      - fiftyone-data:/workspace/data/fiftyone
    environment:
      - COMPUTE_DEVICE=cpu
      - FIFTYONE_DATABASE_URI=mongodb://mongodb:27017/fiftyone
    networks:
      - mlops-network
    profiles:
      - workers
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G

  # ---------------------------------------------------------------------------
  # DEV SHELL - use: docker-compose --profile dev up -d dev
  # ---------------------------------------------------------------------------

  dev:
    build:
      context: .
      dockerfile: docker/base/Dockerfile.diffusers
    image: mlops-dev:latest
    container_name: mlops-dev
    depends_on:
      - wandb-server
      - mongodb
    volumes:
      - .:/workspace:cached
      - fiftyone-data:/workspace/data/fiftyone
    environment:
      - MLOPS_ENV=development
      - DEBUG=true
      - WANDB_BASE_URL=http://wandb-server:8080
      - FIFTYONE_DATABASE_URI=mongodb://mongodb:27017/fiftyone
      - COMPUTE_DEVICE=cpu
    ports:
      - "8888:8888"
    stdin_open: true
    tty: true
    networks:
      - mlops-network
    profiles:
      - dev
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G

# =============================================================================
# PHASE 2/3 TODO: Orchestration
