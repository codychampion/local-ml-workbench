# =============================================================================
# VOLUMES
# =============================================================================

volumes:
  mongodb-data:
  comfyui-models:
  comfyui-output:
  comfyui-input:
  fiftyone-data:
  wandb-data:
  label-studio-data:
  flux-output:
  adv-output:
  lora-checkpoints:
  lora-data:

# =============================================================================
# NETWORKS
# =============================================================================

networks:
  mlops-network:
    driver: bridge
