# MLOps Workspace Docker Compose
# ==============================
# Phase 1: Local development environment (CPU-only)
#
# Usage:
#   docker-compose up -d              # Start services
#   docker-compose exec mlops bash    # Enter container
#   docker-compose down               # Stop services

version: '3.8'

services:
  mlops:
    build:
      context: .
      dockerfile: Dockerfile
    image: mlops-workspace:phase1-cpu
    container_name: mlops-workspace

    # Resource constraints for local development
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G

    # Volume mounts for persistence and development
    volumes:
      # Source code (live reload during development)
      - .:/workspace:cached

      # Persistent data directories
      - mlops-data-raw:/workspace/data/raw
      - mlops-data-processed:/workspace/data/processed
      - mlops-outputs:/workspace/outputs

      # FiftyOne database persistence
      - mlops-fiftyone:/workspace/data/fiftyone

      # W&B offline runs persistence
      - mlops-wandb:/workspace/outputs/wandb

    # Environment variables
    environment:
      # Phase 1: Local/Offline configuration
      - MLOPS_ENV=development
      - DEBUG=true

      # W&B Configuration (offline mode)
      - WANDB_MODE=offline
      - WANDB_PROJECT=mlops-workspace
      - WANDB_DIR=/workspace/outputs/wandb

      # FiftyOne Configuration
      - FIFTYONE_DATABASE_DIR=/workspace/data/fiftyone
      - FIFTYONE_DEFAULT_DATASET_DIR=/workspace/data/fiftyone/datasets

      # B2 Configuration (mocked in Phase 1)
      - B2_LOCAL_MANIFEST=/workspace/.b2_local_manifest.json
      - B2_LOCAL_DATA_DIR=/workspace/data/raw

      # Compute Configuration
      - COMPUTE_DEVICE=cpu
      - NUM_WORKERS=2

      # PHASE 2/3 TODO: Add real credentials via secrets
      # - WANDB_API_KEY=${WANDB_API_KEY}
      # - B2_APPLICATION_KEY_ID=${B2_APPLICATION_KEY_ID}
      # - B2_APPLICATION_KEY=${B2_APPLICATION_KEY}
      # - PREFECT_API_KEY=${PREFECT_API_KEY}

    # Expose ports for local services
    ports:
      # FiftyOne App
      - "5151:5151"
      # Jupyter (if needed)
      - "8888:8888"
      # PHASE 2/3 TODO: Prefect UI
      # - "4200:4200"

    # Keep container running
    stdin_open: true
    tty: true

    # Healthcheck
    healthcheck:
      test: ["CMD", "python", "-c", "import torch; print('healthy')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # Networking
    networks:
      - mlops-network

