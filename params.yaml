# =============================================================================
# DVC Pipeline Parameters
# =============================================================================
# Modify these values to control pipeline behavior
# Run: dvc repro to execute the pipeline
# =============================================================================

# ---------------------------------------------------------------------------
# Data Collection Parameters (data-collector container)
# ---------------------------------------------------------------------------
collect:
  subreddit: earthporn
  limit: 100
  sort: top        # hot, new, top, rising
  time: week       # hour, day, week, month, year, all

# ---------------------------------------------------------------------------
# Captioning Parameters (captioner container)
# ---------------------------------------------------------------------------
caption:
  model: blip-base       # blip-base, blip-large, blip2-opt, git-base, git-large
  output_format: txt     # txt, json, jsonl

# ---------------------------------------------------------------------------
# Dataset Parameters
# ---------------------------------------------------------------------------
dataset:
  name: training-dataset

# ---------------------------------------------------------------------------
# Fine-tuning Parameters (captioner container)
# ---------------------------------------------------------------------------
finetune:
  base_model: blip-base
  output_name: my-captioner-v1
  epochs: 3
  batch_size: 4
  learning_rate: 1e-4
  lora_rank: 8

# ---------------------------------------------------------------------------
# LoRA Training Parameters (lora-trainer container) - Phase 2/3
# ---------------------------------------------------------------------------
lora:
  base_model: stabilityai/stable-diffusion-xl-base-1.0
  learning_rate: 1e-4
  epochs: 10
  batch_size: 1
  gradient_accumulation: 4
  rank: 16
  alpha: 32
